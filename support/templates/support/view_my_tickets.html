{% extends "base.html" %}

{% block content %}
<h1>My Tickets</h1>
<ul>
    {% for ticket in tickets %}
        <li>
            <a href="{% url 'edit_ticket' ticket.id %}">{{ ticket.subject }}</a>
            ({{ ticket.satatus }})
            <a href="{% url 'delete_ticket' ticket.id %}">Delete</a>
            <a href="{% url 'add_comment' ticket.id %}">Comment</a>
        </li>
</ul>


{% endblock %}
